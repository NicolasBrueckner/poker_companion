name: poker_companion
description: "An app to use during and after poker games to calculate minimal payout routes. This app also stores a game history with interesting stats about your games."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  vector_graphics: ^1.2.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  vector_graphics_compiler: ^1.2.6
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon_1024.png"
  adaptive_icon_background: "#1F2430"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground_1024.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - path: assets/playing-cards/
      transformers:
        - package: vector_graphics_compiler
    - path: assets/playing-cards/suits/

  fonts:
    - family: Nunito
      fonts:
      - asset: fonts/Nunito-VariableFont_wght.ttf
      - asset: fonts/Nunito-Italic-VariableFont_wght.ttf
        style: italic
